name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build PIN config
        run: npm run build
        env:
          APP_PIN: ${{ secrets.APP_PIN }}

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: ".github,node_modules,.env,.env.example,info1.md,info2.md,info3.md,info4.md,1E8C2A3B-FE2B-4587-80C1-EF56647CFC06.png,Image2.png,Image3.png,package.json,scripts"
