<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Electrician apprentice training — safety, power flow, tools, and code basics.">
  <title>ElectricianAi</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="pin-screen" class="screen" hidden>
    <header class="pin-header">
      <h1>ElectricianAi</h1>
      <p class="subtitle">Enter your 6-digit code</p>
    </header>
    <div class="pin-dots" id="pin-dots" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
    <p id="pin-error" class="pin-error" role="alert" hidden>Try again</p>
    <div class="pin-pad" id="pin-pad"></div>
  </div>

  <div id="app-screen" class="screen" hidden>
    <header class="app-header">
      <button type="button" id="btn-back" class="btn-icon" aria-label="Back" hidden>&larr;</button>
      <h1 id="app-title">ElectricianAi</h1>
      <button type="button" id="btn-search" class="btn-icon" aria-label="Search">&#128269;</button>
    </header>

    <main id="main" class="main">
      <section id="view-home" class="view">
        <p class="lead">Learn electrical work step by step. Pick any topic — everything is open.</p>
        <details class="suggested-path">
          <summary>Suggested 7-day reading order (optional)</summary>
          <ol id="suggested-path-list"></ol>
        </details>
        <div id="topic-grid" class="topic-grid"></div>
      </section>

      <section id="view-topic" class="view" hidden>
        <p id="topic-intro" class="topic-intro"></p>
        <div id="topic-cards" class="cards"></div>
      </section>

      <section id="view-search" class="view" hidden>
        <label class="search-label" for="search-input">Search lessons</label>
        <input type="search" id="search-input" class="search-input" placeholder="e.g. grounding, multimeter, BRB" autocomplete="off">
        <ul id="search-results" class="search-results"></ul>
      </section>
    </main>
  </div>

  <div id="image-modal" class="image-modal" hidden>
    <button type="button" class="image-modal-close" aria-label="Close">&times;</button>
    <img id="image-modal-img" src="" alt="">
  </div>

  <script src="js/pin-hash.js"></script>
  <script src="js/auth.js" type="module"></script>
  <script src="js/app.js" type="module"></script>
</body>
</html>
